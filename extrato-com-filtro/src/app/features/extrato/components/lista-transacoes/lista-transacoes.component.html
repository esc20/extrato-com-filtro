<div class="lista-container">
  @for (item of transacoes(); track item.id) {
    <div class="transacao-item" [class.entrada]="item.tipo === 'ENTRADA'">
      <div class="info-lado-esquerdo">
        <span class="icone">{{ item.icone }}</span>
        <div class="detalhes">
          <p class="descricao">{{ item.descricao }}</p>
          <span class="data">{{ item.data | date:'dd MMM yyyy' }}</span>
        </div>
      </div>
      
      <div class="valor-lado-direito">
        <span class="valor">
          {{ item.tipo === 'SAIDA' ? '-' : '' }}{{ item.valor | currency:'BRL' }}
        </span>
      </div>
    </div>
  } @empty {
    <div class="empty-state">
      <p>Nenhuma transação encontrada.</p>
    </div>
  }
</div>
